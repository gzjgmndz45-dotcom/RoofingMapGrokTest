<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marker Karte</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="legend">
    <b>Legende:</b><br>
    ● Grün=Dach<br>
    ● Gelb=Komplikationen<br>
    ● Rot=Nein
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    window.addEventListener("load", () => {

      // ✅ Supabase Client
      const sb = supabase.createClient(
        'https://vxnvskwmhxbzmdzozmvp.supabase.co',
        'DEIN_ANON_KEY'
      );

      // Karte
      const map = L.map('map').setView([51.5, 10], 6);

      const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
      const satellite = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
      );

      osm.addTo(map);

      L.control.layers({
        "Normal": osm,
        "Satellit": satellite
      }).addTo(map);

      const markerGroup = L.layerGroup().addTo(map);

      function createIcon(color) {
        return L.divIcon({
          html: `<div style="background:${color};width:24px;height:24px;border-radius:50%;border:3px solid white"></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });
      }

      // 🔥 MARKER LADEN
      async function loadMarkers() {
        markerGroup.clearLayers();

        const { data, error } = await sb.from('markers').select('*');

        if (error) {
          console.error("❌ Load Fehler:", error);
          return;
        }

        data?.forEach(m => {
          const marker = L.marker([m.lat, m.lng], {
            icon: createIcon(m.color || "gray")
          }).addTo(markerGroup);

          marker.bindPopup(`
            <b>${m.title || ''}</b><br>
            ${m.info || ''}<br>
            ${m.photo_url ? `<img src="${m.photo_url}" style="max-width:200px">` : ''}
            <br><button onclick="window.deleteMarker('${m.id}')">Löschen</button>
          `);
        });
      }

      // 🔥 MARKER SPEICHERN (mit FULL DEBUG)
      async function saveMarker(lat, lng, color, title, info, file) {

        console.log("➡️ saveMarker gestartet:", { lat, lng, color, title, info, file });

        let photo_url = null;

        try {

          if (file) {
            const filename = Date.now() + '-' + file.name;

            const upload = await sb.storage
              .from('marker-photos')
              .upload(filename, file);

            if (upload.error) {
              console.error("❌ Upload Fehler:", upload.error);
              alert(upload.error.message);
              return;
            }

            photo_url = sb.storage
              .from('marker-photos')
              .getPublicUrl(filename).data.publicUrl;
          }

          const insert = await sb.from('markers').insert({
            lat,
            lng,
            color,
            title,
            info,
            photo_url
          });

          if (insert.error) {
            console.error("❌ Insert Fehler:", insert.error);
            alert("Insert Fehler: " + insert.error.message);
            return;
          }

          console.log("✅ Marker gespeichert!");
          loadMarkers();

        } catch (err) {
          console.error("❌ Unerwarteter Fehler:", err);
        }
      }

      // 🔥 DELETE
      window.deleteMarker = async (id) => {
        if (confirm("Löschen?")) {
          const res = await sb.from('markers').delete().eq('id', id);

          if (res.error) {
            console.error(res.error);
            return;
          }

          loadMarkers();
        }
      };

      // 🔥 CLICK EVENT
      map.on('click', (e) => {

        const color = prompt("Farbe (grün / gelb / rot)", "grün") || "grün";
        const title = prompt("Titel") || "";
        const info = prompt("Info") || "";

        if (confirm("Foto hinzufügen?")) {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';

          input.onchange = ev => {
            const file = ev.target.files[0];

            saveMarker(
              e.latlng.lat,
              e.latlng.lng,
              color,
              title,
              info,
              file
            );
          };

          input.click();
          return;
        }

        saveMarker(
          e.latlng.lat,
          e.latlng.lng,
          color,
          title,
          info,
          null
        );
      });

      loadMarkers();
    });
  </script>
</body>
</html>
